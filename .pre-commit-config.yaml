# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v5.0.0
  hooks:
    - id: check-added-large-files
    - id: check-ast
    - id: check-case-conflict
    - id: check-merge-conflict
    - id: check-shebang-scripts-are-executable
    - id: check-symlinks
    - id: check-toml
    - id: check-xml
    - id: check-yaml
      exclude: '.*\.gitlab-ci\.yml$'  # Gitlab CI YAML has some nonstandard tags, TODO check these also
    - id: end-of-file-fixer
    - id: forbid-submodules
    - id: mixed-line-ending
    - id: trailing-whitespace
# This one supports comments in JSON, vs the one in pre-commit-hooks does not
- repo: https://gitlab.com/bmares/check-json5
  rev: v1.0.0
  hooks:
    - id: check-json5
- repo: local
  hooks:
    - id: no-src-checkin
      name: Not allowed to check in files under src/
      entry: not allowed to check in files under src/
      files: '^src/.*'
      language: fail
